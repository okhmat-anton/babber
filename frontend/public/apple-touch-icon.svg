<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D2FF"/>
      <stop offset="50%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#FF2DAF"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <rect width="180" height="180" rx="36" fill="url(#glow)"/>
  <!-- Connections -->
  <g stroke="#FFF" stroke-width="1.5" opacity="0.45" stroke-linecap="round">
    <line x1="90" y1="90" x2="58" y2="52"/>
    <line x1="90" y1="90" x2="122" y2="52"/>
    <line x1="90" y1="90" x2="48" y2="95"/>
    <line x1="90" y1="90" x2="132" y2="95"/>
    <line x1="90" y1="90" x2="62" y2="132"/>
    <line x1="90" y1="90" x2="118" y2="132"/>
  </g>
  <!-- Center -->
  <g filter="url(#g)">
    <circle cx="90" cy="90" r="16" fill="#FFF" opacity="0.15"/>
    <circle cx="90" cy="90" r="11" fill="#FFF" opacity="0.92"/>
    <text x="90" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="13" fill="#7B2FFF">AI</text>
  </g>
  <!-- Nodes -->
  <g filter="url(#g)">
    <circle cx="58" cy="52" r="6" fill="#00F0FF"/><circle cx="58" cy="52" r="3" fill="#FFF"/>
    <circle cx="122" cy="52" r="6" fill="#A855F7"/><circle cx="122" cy="52" r="3" fill="#FFF"/>
    <circle cx="48" cy="95" r="5" fill="#00D2FF"/><circle cx="48" cy="95" r="2.5" fill="#FFF"/>
    <circle cx="132" cy="95" r="5" fill="#FF6BF5"/><circle cx="132" cy="95" r="2.5" fill="#FFF"/>
    <circle cx="62" cy="132" r="6" fill="#3B82F6"/><circle cx="62" cy="132" r="3" fill="#FFF"/>
    <circle cx="118" cy="132" r="6" fill="#FF2DAF"/><circle cx="118" cy="132" r="3" fill="#FFF"/>
  </g>
</svg>
