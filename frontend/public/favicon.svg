<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main gradient: electric blue → vivid purple → hot magenta -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D2FF"/>
      <stop offset="50%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#FF2DAF"/>
    </linearGradient>
    <!-- Inner glow -->
    <radialGradient id="glow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Pulse ring gradient -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#FF6BF5"/>
    </linearGradient>
    <!-- Node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7B2FFF" flood-opacity="0.5"/>
    </filter>
    <!-- Soft glow for elements -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Strong glow for center -->
    <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Inner glow overlay -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#glow)"/>

  <!-- Outer pulse ring -->
  <circle cx="256" cy="256" r="155" fill="none" stroke="url(#ring)" stroke-width="2.5" opacity="0.5"/>
  <circle cx="256" cy="256" r="175" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.25" stroke-dasharray="12 8"/>

  <!-- Neural network connections (lines between nodes) -->
  <g stroke="#FFFFFF" stroke-width="2.5" opacity="0.5" stroke-linecap="round" filter="url(#softGlow)">
    <!-- Center to outer nodes -->
    <line x1="256" y1="256" x2="170" y2="155"/>
    <line x1="256" y1="256" x2="342" y2="155"/>
    <line x1="256" y1="256" x2="145" y2="270"/>
    <line x1="256" y1="256" x2="367" y2="270"/>
    <line x1="256" y1="256" x2="180" y2="370"/>
    <line x1="256" y1="256" x2="332" y2="370"/>

    <!-- Cross connections -->
    <line x1="170" y1="155" x2="342" y2="155" opacity="0.3"/>
    <line x1="145" y1="270" x2="170" y2="155" opacity="0.3"/>
    <line x1="367" y1="270" x2="342" y2="155" opacity="0.3"/>
    <line x1="145" y1="270" x2="180" y2="370" opacity="0.3"/>
    <line x1="367" y1="270" x2="332" y2="370" opacity="0.3"/>
    <line x1="180" y1="370" x2="332" y2="370" opacity="0.3"/>
  </g>

  <!-- AI "Brain" center core -->
  <g filter="url(#coreGlow)">
    <circle cx="256" cy="256" r="38" fill="#FFFFFF" opacity="0.15"/>
    <circle cx="256" cy="256" r="28" fill="#FFFFFF" opacity="0.9"/>
    <!-- AI symbol: stylized "A" circuit -->
    <text x="256" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="32" fill="url(#bg)" letter-spacing="-1">AI</text>
  </g>

  <!-- Outer neural nodes -->
  <g filter="url(#softGlow)">
    <!-- Top-left node -->
    <circle cx="170" cy="155" r="14" fill="#00F0FF" opacity="0.9"/>
    <circle cx="170" cy="155" r="7" fill="#FFFFFF"/>

    <!-- Top-right node -->
    <circle cx="342" cy="155" r="14" fill="#A855F7" opacity="0.9"/>
    <circle cx="342" cy="155" r="7" fill="#FFFFFF"/>

    <!-- Mid-left node -->
    <circle cx="145" cy="270" r="12" fill="#00D2FF" opacity="0.9"/>
    <circle cx="145" cy="270" r="6" fill="#FFFFFF"/>

    <!-- Mid-right node -->
    <circle cx="367" cy="270" r="12" fill="#FF6BF5" opacity="0.9"/>
    <circle cx="367" cy="270" r="6" fill="#FFFFFF"/>

    <!-- Bottom-left node -->
    <circle cx="180" cy="370" r="14" fill="#3B82F6" opacity="0.9"/>
    <circle cx="180" cy="370" r="7" fill="#FFFFFF"/>

    <!-- Bottom-right node -->
    <circle cx="332" cy="370" r="14" fill="#FF2DAF" opacity="0.9"/>
    <circle cx="332" cy="370" r="7" fill="#FFFFFF"/>
  </g>

  <!-- Tiny sparkle dots for extra vibrancy -->
  <circle cx="200" cy="200" r="3" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="310" cy="195" r="2.5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="155" cy="320" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="360" cy="330" r="2.5" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="256" cy="150" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="256" cy="390" r="2" fill="#FFFFFF" opacity="0.4"/>
</svg>
